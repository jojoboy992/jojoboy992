<svg xmlns="http://www.w3.org/2000/svg" width="120" height="28" role="img" aria-label="LinkedIn">
  <title>LinkedIn</title>
  <!-- Dark left section (icon area) -->
  <rect width="40" height="28" fill="#004b80"/>
  <!-- Blue right section (text area) -->
  <rect x="40" width="80" height="28" fill="#0A66C2"/>
  <!-- "in" logo text -->
  <text x="20" y="21" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="bold" font-style="italic" fill="#ffffff" text-anchor="middle">in</text>
  <!-- LINKEDIN label -->
  <text x="80" y="19" font-family="DejaVu Sans, Verdana, Geneva, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">LINKEDIN</text>
</svg>
